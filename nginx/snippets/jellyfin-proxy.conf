    # ── Rate-limited auth endpoint (5 req/min, burst 3) ─────────────────
    location ~* ^/(jellyfin/)?[Uu]sers/[Aa]uthenticate[Bb]y[Nn]ame {
        limit_req zone=jf_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://jellyfin:8096;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Pelicula-Remote "true";
    }

    # ── Jellyfin proxy (root and /jellyfin prefix) ───────────────────────
    location / {
        proxy_pass http://jellyfin:8096;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Pelicula-Remote "true";
        proxy_buffering off;
    }
