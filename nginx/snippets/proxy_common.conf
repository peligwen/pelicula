# Shared baseline headers for every proxied upstream.
# Location-specific overrides (SSE buffering, etc.) MUST come AFTER the include.
# Connect timeout is short so a wedged upstream fails fast instead of holding
# clients for nginx's 60s default. read/send are NOT set here (nginx's built-in
# default is already 60s) — setting them here would duplicate, and therefore
# conflict with, the 3600s overrides in the SSE and Jellyfin locations (nginx
# treats a directive repeated in the same context as a fatal config error,
# not a later-wins override).
proxy_connect_timeout 10s;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
