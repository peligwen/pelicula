# Shared baseline headers for every proxied upstream.
# Location-specific overrides (SSE buffering, etc.) MUST come AFTER the include.
# Connect timeout is short so a wedged upstream fails fast instead of holding
# clients for nginx's 60s default; read/send stay at 60s — long-lived streams
# (SSE, Jellyfin playback) override these per-location.
proxy_connect_timeout 10s;
proxy_read_timeout 60s;
proxy_send_timeout 60s;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
