worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Peligrosa: remote Jellyfin auth rate-limit (5 req/min per IP) ───
    limit_req_zone $binary_remote_addr zone=jf_auth:10m rate=5r/m;

    server {
        listen 80;
        resolver 127.0.0.11 valid=30s;

        # ── Security headers ─────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Landing page ────────────────────────────
        location = / {
            alias /usr/share/nginx/html/;
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Dashboard static assets ──────────────────
        location = /theme.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /styles.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /service-overrides.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /dashboard.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        location = /framework.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /search.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Settings page (reuses setup wizard HTML) ─
        location = /settings {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            alias /usr/share/nginx/html/;
            try_files /setup.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /setup.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        # ── Register page (public — no auth_request) ─
        location = /register {
            alias /usr/share/nginx/html/;
            try_files /register.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /register.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /register.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /qr.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Import page (storage manager) ────────────
        location = /import {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            alias /usr/share/nginx/html/;
            try_files /import.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /import.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /import.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /catalog.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /catalog.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /jobs.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /logs.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location /fonts/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        # ── Auth subrequest endpoint (internal only) ─
        # nginx auth_request calls this to validate sessions before proxying.
        location = /auth-check {
            internal;
            proxy_pass http://pelicula-api:8181/api/pelicula/auth/check?nginx=1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Login redirect for 401s from auth_request ─
        location @login_redirect {
            return 302 $scheme://$http_host/?login=1;
        }

        # ── Webhook + Procula-internal routes (Docker network only) ─
        # These endpoints are called service-to-service inside the Docker network.
        # Blocking external LAN access here is defense-in-depth; the middleware
        # also requires a shared secret on each request.
        location = /api/pelicula/hooks/import {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /api/pelicula/jellyfin/refresh {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Pelicula API (middleware) ────────────────
        location /api/pelicula/ {
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Strip X-Pelicula-Remote to prevent LAN clients from spoofing remote status.
            # Only the remote vhost (remote.conf.template) sets this header.
            proxy_set_header X-Pelicula-Remote "";
        }

        # ── qBittorrent (no native UrlBase — strip prefix) ──
        location /qbt/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            rewrite /qbt/(.*) /$1 break;
            proxy_pass http://gluetun:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Prowlarr (UrlBase: /prowlarr) ───────────
        location /prowlarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://gluetun:9696;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><link rel="stylesheet" href="/service-overrides.css"></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # ── Sonarr (UrlBase: /sonarr) ───────────────
        location /sonarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://sonarr:8989;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><link rel="stylesheet" href="/service-overrides.css"></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # ── Radarr (UrlBase: /radarr) ───────────────
        location /radarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://radarr:7878;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><link rel="stylesheet" href="/service-overrides.css"></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # ── Gluetun control API (VPN status) ────────
        location /api/vpn/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            rewrite /api/vpn/(.*) /$1 break;
            proxy_pass http://gluetun:8000;
            proxy_set_header Host $host;
        }

        # ── Service health probe (used by dashboard) ─
        location /api/health/ {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Procula (processing pipeline) ───────────
        location /api/procula/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://procula:8282;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Bazarr (BaseUrl: /bazarr) ───────────────
        location /bazarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://bazarr:6767;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Accept-Encoding "";
            sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><link rel="stylesheet" href="/service-overrides.css"></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }

        # ── Jellyfin (BaseUrl: /jellyfin) ───────────
        location /jellyfin {
            proxy_pass http://jellyfin:8096;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
    }

    # ── Peligrosa: remote Jellyfin vhost (generated) ────────────────────
    # Rendered by `./pelicula up` from nginx/remote.conf.template when
    # REMOTE_ACCESS_ENABLED=true. Empty file when remote access is off.
    include /etc/nginx/conf.d/remote.conf;
}
