worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Peligrosa: remote Jellyfin auth rate-limit (5 req/min per IP) ───
    limit_req_zone $binary_remote_addr zone=jf_auth:10m rate=5r/m;

    server {
        listen 80;
        resolver 127.0.0.11 valid=30s;

        # ── Security headers ─────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Landing page ────────────────────────────
        location = / {
            alias /usr/share/nginx/html/;
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Dashboard static assets (JS + CSS) ───────
        # All dashboard .js and .css files share identical no-cache headers.
        # /setup.css is excluded (exact-match below overrides this regex and
        # sets a shorter no-store-only directive used by the setup wizard).
        location ~* ^/[^/]+\.(js|css)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Settings page (reuses setup wizard HTML) ─
        location = /settings {
            include snippets/auth_gate.conf;
            alias /usr/share/nginx/html/;
            try_files /setup.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        # Exact match takes priority over the ~* regex above; setup.css uses a
        # shorter directive because the setup wizard page does its own no-cache.
        location = /setup.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        # ── Register page (public — no auth_request) ─
        location = /register {
            alias /usr/share/nginx/html/;
            try_files /register.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /register.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Import page (storage manager) ────────────
        location = /import {
            include snippets/auth_gate.conf;
            alias /usr/share/nginx/html/;
            try_files /import.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location /fonts/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable";
            expires 1y;
        }

        # ── Auth subrequest endpoint (internal only) ─
        # nginx auth_request calls this to validate sessions before proxying.
        location = /auth-check {
            internal;
            proxy_pass http://pelicula-api:8181/api/pelicula/auth/check?nginx=1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Login redirect for 401s from auth_request ─
        location @login_redirect {
            return 302 $scheme://$http_host/?login=1;
        }

        # ── Webhook + Procula-internal routes (Docker network only) ─
        # These endpoints are called service-to-service inside the Docker network.
        # Blocking external LAN access here is defense-in-depth; the middleware
        # also requires a shared secret on each request.
        location = /api/pelicula/hooks/import {
            include snippets/webhook_allowlist.conf;
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /api/pelicula/jellyfin/refresh {
            include snippets/webhook_allowlist.conf;
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Pelicula SSE stream (real-time dashboard updates) ───
        location = /api/pelicula/sse {
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # ── Pelicula API (middleware) ────────────────
        location /api/pelicula/ {
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Strip X-Pelicula-Remote to prevent LAN clients from spoofing remote status.
            # Only the remote vhost (remote.conf.template) sets this header.
            proxy_set_header X-Pelicula-Remote "";
        }

        # ── Proxy-pass pattern note ───────────────────
        # Services on gluetun's network namespace (qBittorrent, Prowlarr, gluetun
        # control API) use the deferred `set $var; proxy_pass $var;` pattern.
        # This defers DNS resolution to request time, which is necessary because
        # these services are only reachable via gluetun and may not be resolvable
        # when nginx starts (gluetun's network namespace doesn't exist yet).
        # Sonarr, Radarr, Bazarr, Jellyfin, and pelicula-api use direct
        # `proxy_pass http://hostname:port;` — they're on the standard Docker
        # network and are always resolvable at nginx startup.

        # ── qBittorrent (no native UrlBase — strip prefix) ──
        location /qbt/ {
            include snippets/auth_gate.conf;
            rewrite /qbt/(.*) /$1 break;
            set $qbt_upstream http://gluetun:8080;
            proxy_pass $qbt_upstream;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Prowlarr (UrlBase: /prowlarr) ───────────
        location /prowlarr {
            include snippets/auth_gate.conf;
            set $prowlarr_upstream http://gluetun:9696;
            proxy_pass $prowlarr_upstream;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include snippets/arr_theme.conf;
        }

        # ── Sonarr (UrlBase: /sonarr) ───────────────
        location /sonarr {
            include snippets/auth_gate.conf;
            proxy_pass http://sonarr:8989;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include snippets/arr_theme.conf;
        }

        # ── Radarr (UrlBase: /radarr) ───────────────
        location /radarr {
            include snippets/auth_gate.conf;
            proxy_pass http://radarr:7878;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include snippets/arr_theme.conf;
        }

        # ── Gluetun control API (VPN status) ────────
        location /api/vpn/ {
            include snippets/auth_gate.conf;
            rewrite /api/vpn/(.*) /$1 break;
            set $vpn_upstream http://gluetun:8000;
            proxy_pass $vpn_upstream;
            proxy_set_header Host $host;
        }

        # ── Service health probe (used by dashboard) ─
        location /api/health/ {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Procula (processing pipeline) ───────────
        location /api/procula/ {
            include snippets/auth_gate.conf;
            proxy_pass http://procula:8282;
            include snippets/proxy_common.conf;
        }

        # ── Bazarr (BaseUrl: /bazarr) ───────────────
        location /bazarr {
            include snippets/auth_gate.conf;
            proxy_pass http://bazarr:6767;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            include snippets/arr_theme.conf;
        }

        # ── Jellyfin (BaseUrl: /jellyfin) ───────────
        location /jellyfin {
            proxy_pass http://jellyfin:8096;
            include snippets/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
    }

    # ── Peligrosa: remote Jellyfin vhost (generated) ────────────────────
    # Rendered by `./pelicula up` from nginx/remote.conf.template when
    # REMOTE_ACCESS_ENABLED=true. Empty file when remote access is off.
    include /etc/nginx/conf.d/remote.conf;
}
