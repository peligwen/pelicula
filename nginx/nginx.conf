worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        resolver 127.0.0.11 valid=30s;

        # ── Security headers ─────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Landing page ────────────────────────────
        location = / {
            alias /usr/share/nginx/html/;
            try_files /index.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Dashboard static assets ──────────────────
        location = /styles.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /dashboard.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }

        # ── Settings page (reuses setup wizard HTML) ─
        location = /settings {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            alias /usr/share/nginx/html/;
            try_files /setup.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
            expires -1;
        }
        location = /setup.css {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        # ── Auth subrequest endpoint (internal only) ─
        # nginx auth_request calls this to validate sessions before proxying.
        location = /auth-check {
            internal;
            proxy_pass http://pelicula-api:8181/api/pelicula/auth/check?nginx=1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Login redirect for 401s from auth_request ─
        location @login_redirect {
            return 302 /?login=1;
        }

        # ── Pelicula API (middleware) ────────────────
        location /api/pelicula/ {
            proxy_pass http://pelicula-api:8181;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── qBittorrent (no native UrlBase — strip prefix) ──
        location /qbt/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            rewrite /qbt/(.*) /$1 break;
            proxy_pass http://gluetun:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Prowlarr (UrlBase: /prowlarr) ───────────
        location /prowlarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://prowlarr:9696;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Sonarr (UrlBase: /sonarr) ───────────────
        location /sonarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://sonarr:8989;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Radarr (UrlBase: /radarr) ───────────────
        location /radarr {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://radarr:7878;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Gluetun control API (VPN status) ────────
        location /api/vpn/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            rewrite /api/vpn/(.*) /$1 break;
            proxy_pass http://gluetun:8000;
            proxy_set_header Host $host;
        }

        # ── Service health probe (used by dashboard) ─
        location /api/health/ {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        # ── Procula (processing pipeline) ───────────
        location /api/procula/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            proxy_pass http://procula:8282;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Procula dashboard UI ─────────────────────
        location /procula/ {
            auth_request /auth-check;
            error_page 401 = @login_redirect;
            rewrite /procula/(.*) /$1 break;
            proxy_pass http://procula:8282;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Jellyseerr (request management, admin only) ─
        # Note: Jellyseerr does not natively support sub-path serving.
        # API integration works via the Docker internal network.
        # For full UI access the admin can also reach it at /jellyseerr.
        # Variable proxy_pass defers DNS resolution to request time so nginx
        # starts cleanly even when the jellyseerr profile is not active.
        location /jellyseerr {
            set $jellyseerr_upstream http://jellyseerr:5055;
            proxy_pass $jellyseerr_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Jellyfin (BaseUrl: /jellyfin) ───────────
        location /jellyfin {
            proxy_pass http://jellyfin:8096;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }
    }
}
