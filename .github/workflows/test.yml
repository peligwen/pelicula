name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [middleware, procula]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test ./...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck pelicula
        run: shellcheck -S warning pelicula || true
