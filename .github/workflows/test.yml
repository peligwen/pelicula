name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [middleware, procula, cmd/pelicula]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: staticcheck
        working-directory: ${{ matrix.module }}
        run: go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...
      - name: go test (with coverage)
        working-directory: ${{ matrix.module }}
        run: go test -cover ./...
      - name: go test -race
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck test scripts
        run: shellcheck -S warning tests/*.sh
      - name: shellcheck wrapper
        run: shellcheck -S warning pelicula

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install docker compose plugin
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64 \
            -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json
      - name: install Playwright (chromium only)
        working-directory: tests/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: e2e test stack
        run: bash tests/e2e.sh
        timeout-minutes: 25
