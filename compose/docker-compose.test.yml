# Test overlay: replaces gluetun with a no-VPN stub so the full stack can
# start without real VPN credentials.  Use with:
#
#   docker compose -f docker-compose.yml -f docker-compose.test.yml -p pelicula-test ...
#
# The stub serves a minimal HTTP 200 on port 8000 (gluetun control API) so
# that other containers' healthchecks and depends_on pass.  qBittorrent's
# network_mode: "service:gluetun" still works — the stub provides the shared
# network namespace.
#
# Compose generates project-scoped container names automatically from the
# -p pelicula-test project flag: pelicula-test-nginx-1, pelicula-test-sonarr-1,
# pelicula-test-pelicula-api-1, etc.  No explicit container_name overrides
# are needed — the project name keeps the test stack isolated from production.

services:

  # ── VPN stub ─────────────────────────────────────────────────────────────
  gluetun:
    image: alpine:3.20
    # Clear the inherited 6881:6881 torrent port — the alpine stub has no torrents, and
    # without !reset, compose CONCATENATES list fields across overlays rather than replacing
    # them, so a plain `ports: []` would leave 6881 bound and racing the production stack.
    ports: !reset []
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache netcat-openbsd -q 2>/dev/null
        while true; do
          printf 'HTTP/1.1 200 OK\r\nContent-Type: application/json\r\nContent-Length: 15\r\n\r\n{"status":"ok"}' \
            | nc -l -p 8000 2>/dev/null || true
          sleep 0.05
        done
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: "no"

  # ── Port conflict suppression ─────────────────────────────────────────────
  jellyfin:
    ports: !reset []  # suppress 7359:7359/udp LAN discovery — conflicts with production stack (plain [] would concatenate, see gluetun note)
