services:
  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pelicula
    depends_on:
      - nginx

networks:
  pelicula:
    name: pelicula
    external: true
